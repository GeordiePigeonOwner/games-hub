<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games Creation</title>
<style>
  :root {
    --bg-0: #0b0f1e;
    --bg-1: #131831;
    --bg-2: #1a2040;
    --surface: #1d2442;
    --surface-2: #252c52;
    --surface-hi: #2e376a;
    --border: rgba(255,255,255,0.08);
    --border-hi: rgba(255,255,255,0.14);
    --text: #eef1ff;
    --text-dim: rgba(238,241,255,0.65);
    --text-faint: rgba(238,241,255,0.42);
    --accent: #6ac9ff;
    --accent-2: #9a7bff;
    --success: #3ed598;
    --gold: #ffd77a;
    --danger: #ff6b6b;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    color: #eef1ff;
    min-height: 100vh;
    padding: 0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 0%, rgba(154, 123, 255, 0.22), transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 100%, rgba(106, 201, 255, 0.18), transparent 60%),
      linear-gradient(180deg, #0a0e1f 0%, #050812 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background layers */
  .bg-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-crystals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-crystals svg { position: absolute; opacity: 0.18; animation: float 20s ease-in-out infinite; }
  .bg-crystals .c1 { top: 8%;  left: 6%;  width: 90px;  animation-duration: 18s; }
  .bg-crystals .c2 { top: 62%; left: 3%;  width: 64px;  animation-duration: 22s; animation-delay: -4s; }
  .bg-crystals .c3 { top: 14%; right: 8%; width: 110px; animation-duration: 26s; animation-delay: -8s; }
  .bg-crystals .c4 { top: 72%; right: 6%; width: 70px;  animation-duration: 20s; animation-delay: -12s; }
  .bg-crystals .c5 { top: 36%; left: 50%; width: 48px;  animation-duration: 24s; animation-delay: -2s; opacity: 0.1; }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25%      { transform: translate(18px, -20px) rotate(8deg); }
    50%      { transform: translate(-10px, -32px) rotate(-4deg); }
    75%      { transform: translate(-16px, -12px) rotate(6deg); }
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
    max-width: 1240px;
    width: 100%;
  }

  /* Hero */
  .hero { text-align: center; max-width: 820px; margin-bottom: 44px; }
  .hero-kicker {
    display: inline-block;
    font-family: 'Syncopate', 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: #6ac9ff;
    padding: 6px 14px;
    border: 1px solid rgba(106, 201, 255, 0.3);
    border-radius: 20px;
    background: rgba(106, 201, 255, 0.06);
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-size: clamp(44px, 7vw, 76px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0 0 16px;
    color: #eef1ff;
    filter: drop-shadow(0 4px 32px rgba(106, 201, 255, 0.15));
  }
  @supports ((-webkit-background-clip: text) or (background-clip: text)) {
    .hero h1 {
      background: linear-gradient(135deg, #ffffff 0%, #9acfff 25%, #b8a0ff 55%, #ffffff 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 9s ease-in-out infinite;
    }
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .hero .sub {
    font-size: 17px;
    line-height: 1.6;
    color: rgba(238,241,255,0.75);
    margin: 0 auto;
    max-width: 540px;
  }

  /* Stats strip */
  .stats-strip { display: flex; gap: 40px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    font-size: 28px;
    font-weight: 700;
    color: #eef1ff;
    line-height: 1;
  }
  .stat-num.gold { color: #ffd77a; }
  .stat-num.accent { color: #6ac9ff; }
  .stat-label {
    font-size: 11px;
    color: rgba(238,241,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 6px;
    font-weight: 600;
  }

  /* Filters */
  .filters {
    display: inline-flex;
    gap: 4px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 5px;
    background: rgba(10, 14, 30, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
  }
  .pill {
    background: transparent;
    color: rgba(238,241,255,0.7);
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    font-family: inherit;
    transition: all 0.15s var(--ease);
  }
  .pill:hover { color: #eef1ff; background: rgba(255,255,255,0.04); }
  .pill.active {
    background: linear-gradient(135deg, #6ac9ff 0%, #9a7bff 100%);
    color: #0a1020;
    box-shadow: 0 2px 10px rgba(106, 201, 255, 0.35);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 22px;
    max-width: 1200px;
    width: 100%;
  }

  /* Cards (each is an <a>) */
  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(40, 48, 86, 0.8) 0%, rgba(20, 26, 56, 0.92) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: all 0.25s var(--ease);
    text-decoration: none;
    color: #eef1ff;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.2);
    box-shadow:
      0 18px 40px rgba(0,0,0,0.45),
      0 0 40px rgba(106,201,255,0.08);
  }
  .card.coming-soon { opacity: 0.55; filter: grayscale(0.3); cursor: not-allowed; pointer-events: none; }

  .card-header {
    height: 150px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-header svg.illo {
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
  }
  .card-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.12) 1px, transparent 0);
    background-size: 14px 14px;
    opacity: 0.3;
  }
  .card-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 45%, rgba(10,14,30,0.85) 100%);
    pointer-events: none;
  }

  .zone-tag {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 3;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 5px 11px;
    border-radius: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ffffff;
  }

  .card-body {
    padding: 20px 22px 22px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 8px;
    position: relative;
    z-index: 1;
  }
  .card h3 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.2;
    color: #eef1ff;
  }
  .card p {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.55;
    color: rgba(238,241,255,0.65);
    flex: 1;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 12px;
  }

  .play-btn {
    background: linear-gradient(135deg, #6ac9ff 0%, #9a7bff 100%);
    color: #0a1020;
    padding: 9px 18px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 14px rgba(106, 201, 255, 0.3);
  }
  .play-btn::after { content: '→'; font-size: 14px; }
  .play-btn.disabled {
    background: rgba(255,255,255,0.05);
    color: rgba(238,241,255,0.4);
    box-shadow: none;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .play-btn.disabled::after { content: ''; }

  .best-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255, 215, 122, 0.12);
    border: 1px solid rgba(255, 215, 122, 0.28);
    color: #ffd77a;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  .best-pill::before { content: '★'; font-size: 11px; }
  .best-pill.none {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
    color: rgba(238,241,255,0.4);
  }
  .best-pill.none::before { content: ''; }

  /* Zone header backgrounds */
  .zone-aztec      .card-header { background: radial-gradient(ellipse at 50% 50%, #ff9a3c 0%, #a0480a 55%, #1c0d03 100%); }
  .zone-medieval   .card-header { background: radial-gradient(ellipse at 50% 50%, #f04a52 0%, #6f1318 55%, #1a0306 100%); }
  .zone-futuristic .card-header { background: radial-gradient(ellipse at 50% 50%, #5ecafd 0%, #1e4780 55%, #02112b 100%); }
  .zone-industrial .card-header { background: radial-gradient(ellipse at 50% 50%, #a2b0ba 0%, #3a424e 55%, #0d1015 100%); }
  .zone-eastern    .card-header { background: radial-gradient(ellipse at 50% 50%, #c58cff 0%, #4a1e82 55%, #160628 100%); }
  .zone-bonus      .card-header { background: radial-gradient(ellipse at 50% 50%, #ffd77a 0%, #a06410 55%, #2a1905 100%); }

  .zone-aztec      .zone-tag { color: #ffd9a8; }
  .zone-medieval   .zone-tag { color: #ffb1b5; }
  .zone-futuristic .zone-tag { color: #b5e2ff; }
  .zone-industrial .zone-tag { color: #d8dfe5; }
  .zone-eastern    .zone-tag { color: #e3c7ff; }
  .zone-bonus      .zone-tag { color: #ffe8b5; }

  .page-footer {
    margin-top: 60px;
    color: rgba(238,241,255,0.35);
    font-size: 12px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .page-footer::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    margin: 0 auto 16px;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-crystals">
  <svg class="c1" viewBox="0 0 100 100"><polygon points="50,5 95,35 80,90 20,90 5,35" fill="none" stroke="#6ac9ff" stroke-width="1.5"/><polygon points="50,5 50,90 95,35" fill="none" stroke="#6ac9ff" stroke-width="0.7"/><polygon points="50,5 50,90 5,35" fill="none" stroke="#6ac9ff" stroke-width="0.7"/></svg>
  <svg class="c2" viewBox="0 0 100 100"><polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#9a7bff" stroke-width="1.5"/></svg>
  <svg class="c3" viewBox="0 0 100 100"><polygon points="50,5 95,35 80,90 20,90 5,35" fill="none" stroke="#3ed598" stroke-width="1.5"/></svg>
  <svg class="c4" viewBox="0 0 100 100"><polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#ffd77a" stroke-width="1.5"/></svg>
  <svg class="c5" viewBox="0 0 100 100"><polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#ff6b6b" stroke-width="1.2"/></svg>
</div>

<div class="content">
  <div class="hero">
    <div class="hero-kicker">The Crystal Maze · Mental Games</div>
    <h1>Games Creation</h1>
    <p class="sub">Classic puzzles reimagined as browser minigames. Pick a zone, crack the code, beat your best time.</p>
  </div>

  <div class="stats-strip" id="stats"></div>

  <div class="filters" id="filters">
    <button class="pill active" data-zone="all">All</button>
    <button class="pill" data-zone="aztec">Aztec</button>
    <button class="pill" data-zone="medieval">Medieval</button>
    <button class="pill" data-zone="futuristic">Futuristic</button>
    <button class="pill" data-zone="industrial">Industrial</button>
    <button class="pill" data-zone="eastern">Eastern</button>
    <button class="pill" data-zone="bonus">Bonus</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="page-footer">GAMES CREATION · INSPIRED BY THE CRYSTAL MAZE</div>
</div>

<script>
  // Inline framework (no external dependency)
  const STORAGE_KEY = 'gamesCreation.records.v1';
  function loadRecords() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }
  function formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
    const s = (Math.floor(totalSeconds) % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }
  function getBestAcrossConfigs(gameId) {
    const all = loadRecords();
    const prefix = gameId + ':';
    let best = null, totalWins = 0;
    for (const key of Object.keys(all)) {
      if (key !== gameId && !key.startsWith(prefix)) continue;
      const r = all[key];
      totalWins += r.wins || 0;
      if (r.bestSeconds != null && (best == null || r.bestSeconds < best)) best = r.bestSeconds;
    }
    return { bestSeconds: best, totalWins };
  }

  const ILLO = {
    mastermind: `<svg class="illo" width="100" height="60" viewBox="0 0 100 60"><circle cx="18" cy="30" r="11" fill="#e74c3c"/><circle cx="40" cy="30" r="11" fill="#f1c40f"/><circle cx="62" cy="30" r="11" fill="#3ed598"/><circle cx="84" cy="30" r="11" fill="#6ac9ff"/><circle cx="22" cy="12" r="3" fill="#111"/><circle cx="30" cy="12" r="3" fill="#fff"/></svg>`,
    'planet-order': `<svg class="illo" width="120" height="80" viewBox="0 0 120 80"><defs><radialGradient id="sun-g"><stop offset="0" stop-color="#fff5c9"/><stop offset="0.6" stop-color="#ffdf7a"/><stop offset="1" stop-color="#c48b0c"/></radialGradient></defs><ellipse cx="60" cy="40" rx="50" ry="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/><ellipse cx="60" cy="40" rx="38" ry="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/><circle cx="60" cy="40" r="12" fill="url(#sun-g)"/><circle cx="98" cy="40" r="4" fill="#3ed598"/><circle cx="23" cy="45" r="5" fill="#e67e22"/></svg>`,
    countdown: `<svg class="illo" width="110" height="70" viewBox="0 0 110 70"><g font-family="JetBrains Mono, monospace" font-weight="700"><text x="15" y="45" font-size="30" fill="#6ac9ff">1</text><text x="32" y="45" font-size="30" fill="#9a7bff">0</text><text x="52" y="45" font-size="30" fill="#ffd77a">0</text><text x="76" y="45" font-size="20" fill="rgba(255,255,255,0.4)">→ 1</text></g></svg>`,
    'stop-clock': `<svg class="illo" width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="42" r="28" fill="none" stroke="#ffd77a" stroke-width="2.5"/><circle cx="40" cy="42" r="2.5" fill="#ffd77a"/><line x1="40" y1="42" x2="40" y2="22" stroke="#ffd77a" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="42" x2="56" y2="42" stroke="#ffd77a" stroke-width="2" stroke-linecap="round"/><rect x="34" y="8" width="12" height="5" rx="1.5" fill="#ffd77a"/><rect x="37" y="4" width="6" height="5" fill="#ffd77a"/></svg>`,
    'symbol-wheels': `<svg class="illo" width="90" height="90" viewBox="0 0 90 90"><g stroke="#ff9a3c" fill="none"><circle cx="45" cy="45" r="36" stroke-width="2"/><circle cx="45" cy="45" r="24" stroke-width="2"/><circle cx="45" cy="45" r="12" stroke-width="2"/></g><g fill="#ff9a3c"><polygon points="45,14 49,22 41,22"/><polygon points="45,76 41,68 49,68"/><polygon points="14,45 22,41 22,49"/><polygon points="76,45 68,49 68,41"/></g></svg>`,
    'number-tower': `<svg class="illo" width="70" height="90" viewBox="0 0 70 90"><g stroke="#c58cff" stroke-width="1.5" fill="rgba(197,140,255,0.12)"><rect x="15" y="60" width="40" height="18" rx="2"/><rect x="18" y="42" width="34" height="18" rx="2"/><rect x="21" y="24" width="28" height="18" rx="2"/><rect x="24" y="8" width="22" height="16" rx="2"/></g><g font-family="JetBrains Mono, monospace" font-size="10" fill="#c58cff" text-anchor="middle" font-weight="700"><text x="35" y="72">4</text><text x="35" y="54">3</text><text x="35" y="36">2</text><text x="35" y="19">1</text></g></svg>`,
    'numeral-grid': `<svg class="illo" width="90" height="90" viewBox="0 0 90 90"><g stroke="#d0454c" fill="rgba(208,69,76,0.1)" stroke-width="1.5"><rect x="10" y="10" width="22" height="22" rx="2"/><rect x="34" y="10" width="22" height="22" rx="2"/><rect x="58" y="10" width="22" height="22" rx="2"/><rect x="10" y="34" width="22" height="22" rx="2"/><rect x="34" y="34" width="22" height="22" rx="2"/><rect x="58" y="34" width="22" height="22" rx="2"/><rect x="10" y="58" width="22" height="22" rx="2"/><rect x="34" y="58" width="22" height="22" rx="2"/><rect x="58" y="58" width="22" height="22" rx="2"/></g><g font-family="serif" font-size="14" fill="#ffb1b5" text-anchor="middle" font-weight="700"><text x="21" y="26">I</text><text x="45" y="26">V</text><text x="69" y="26">X</text></g></svg>`,
    'tube-spectrum': `<svg class="illo" width="110" height="80" viewBox="0 0 110 80"><rect x="10" y="14" width="14" height="54" rx="7" fill="#e74c3c"/><rect x="28" y="14" width="14" height="54" rx="7" fill="#ff9a3c"/><rect x="46" y="14" width="14" height="54" rx="7" fill="#ffd77a"/><rect x="64" y="14" width="14" height="54" rx="7" fill="#3ed598"/><rect x="82" y="14" width="14" height="54" rx="7" fill="#6ac9ff"/></svg>`,
    'synonym-dominoes': `<svg class="illo" width="120" height="60" viewBox="0 0 120 60"><g stroke="#ffb1b5" stroke-width="1.5" fill="rgba(208,69,76,0.2)"><rect x="6"  y="16" width="50" height="28" rx="3"/><line x1="31" y1="16" x2="31" y2="44"/><rect x="62" y="16" width="50" height="28" rx="3"/><line x1="87" y1="16" x2="87" y2="44"/></g></svg>`,
    'word-chain': `<svg class="illo" width="120" height="60" viewBox="0 0 120 60"><g fill="none" stroke="#ffb1b5" stroke-width="3"><ellipse cx="26" cy="30" rx="16" ry="10"/><ellipse cx="60" cy="30" rx="16" ry="10"/><ellipse cx="94" cy="30" rx="16" ry="10"/></g></svg>`,
    pipework: `<svg class="illo" width="96" height="96" viewBox="0 0 96 96"><g fill="none" stroke="#a4b0ba" stroke-width="7" stroke-linecap="round"><path d="M 12 48 L 84 48"/><path d="M 48 12 L 48 84"/></g><circle cx="48" cy="48" r="6" fill="#a4b0ba"/></svg>`,
    'block-grid': `<svg class="illo" width="90" height="90" viewBox="0 0 90 90"><g><rect x="10" y="10" width="16" height="16" fill="#5ecafd"/><rect x="28" y="10" width="16" height="16" fill="rgba(255,255,255,0.08)"/><rect x="46" y="10" width="16" height="16" fill="#5ecafd"/><rect x="64" y="10" width="16" height="16" fill="#5ecafd"/><rect x="10" y="28" width="16" height="16" fill="rgba(255,255,255,0.08)"/><rect x="28" y="28" width="16" height="16" fill="#5ecafd"/><rect x="46" y="28" width="16" height="16" fill="#5ecafd"/><rect x="64" y="28" width="16" height="16" fill="rgba(255,255,255,0.08)"/><rect x="10" y="46" width="16" height="16" fill="#5ecafd"/><rect x="28" y="46" width="16" height="16" fill="#5ecafd"/><rect x="46" y="46" width="16" height="16" fill="rgba(255,255,255,0.08)"/><rect x="64" y="46" width="16" height="16" fill="#5ecafd"/></g></svg>`,
    'the-wall': `<svg class="illo" width="110" height="90" viewBox="0 0 110 90"><defs><linearGradient id="tw-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c2353"/><stop offset="1" stop-color="#05102a"/></linearGradient><radialGradient id="tw-peg" cx="0.35" cy="0.35"><stop offset="0" stop-color="#e6f5ff"/><stop offset="0.5" stop-color="#5ec8ff"/><stop offset="1" stop-color="#1a4a8a"/></radialGradient><radialGradient id="tw-green" cx="0.35" cy="0.35"><stop offset="0" stop-color="#c6ffd9"/><stop offset="0.6" stop-color="#3ed598"/><stop offset="1" stop-color="#1c6a45"/></radialGradient></defs><rect x="4" y="4" width="102" height="82" rx="6" fill="url(#tw-bg)" stroke="rgba(94,200,255,0.4)" stroke-width="1.2"/><g fill="url(#tw-peg)"><circle cx="20" cy="22" r="3"/><circle cx="36" cy="22" r="3"/><circle cx="52" cy="22" r="3"/><circle cx="68" cy="22" r="3"/><circle cx="84" cy="22" r="3"/><circle cx="28" cy="36" r="3"/><circle cx="44" cy="36" r="3"/><circle cx="60" cy="36" r="3"/><circle cx="76" cy="36" r="3"/><circle cx="20" cy="50" r="3"/><circle cx="36" cy="50" r="3"/><circle cx="52" cy="50" r="3"/><circle cx="68" cy="50" r="3"/><circle cx="84" cy="50" r="3"/></g><g stroke="rgba(94,200,255,0.4)" stroke-width="0.8"><line x1="14" y1="64" x2="14" y2="80"/><line x1="32" y1="64" x2="32" y2="80"/><line x1="50" y1="64" x2="50" y2="80"/><line x1="68" y1="64" x2="68" y2="80"/><line x1="86" y1="64" x2="86" y2="80"/></g><g font-family="JetBrains Mono, monospace" font-weight="700" font-size="7" fill="#ffd77a" text-anchor="middle"><text x="23" y="76">£1K</text><text x="41" y="76">£10K</text><text x="59" y="76">£1M</text><text x="77" y="76">£10K</text></g><circle cx="60" cy="42" r="4.5" fill="url(#tw-green)" filter="drop-shadow(0 0 3px rgba(62,213,152,0.7))"/></svg>`,
    blockbusters: `<svg class="illo" width="120" height="80" viewBox="0 0 120 80"><defs><linearGradient id="bb-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5b9ad9"/><stop offset="1" stop-color="#1f4e87"/></linearGradient><linearGradient id="bb-cream" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdf8e2"/><stop offset="1" stop-color="#d4caa0"/></linearGradient><linearGradient id="bb-frame" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fce47a"/><stop offset="0.5" stop-color="#c89018"/><stop offset="1" stop-color="#6b4708"/></linearGradient></defs><rect x="4" y="6" width="112" height="68" rx="6" fill="#3fb4c2" stroke="url(#bb-frame)" stroke-width="4"/><g stroke="#1c2238" stroke-width="1.1"><polygon points="14,20 22,15 30,20 30,30 22,35 14,30" fill="url(#bb-cream)"/><polygon points="14,40 22,35 30,40 30,50 22,55 14,50" fill="url(#bb-blue)"/><polygon points="30,30 38,25 46,30 46,40 38,45 30,40" fill="url(#bb-blue)"/><polygon points="30,50 38,45 46,50 46,60 38,65 30,60" fill="url(#bb-cream)"/><polygon points="46,20 54,15 62,20 62,30 54,35 46,30" fill="url(#bb-cream)"/><polygon points="46,40 54,35 62,40 62,50 54,55 46,50" fill="url(#bb-blue)"/><polygon points="62,30 70,25 78,30 78,40 70,45 62,40" fill="url(#bb-cream)"/><polygon points="62,50 70,45 78,50 78,60 70,55 62,60" fill="url(#bb-blue)"/><polygon points="78,20 86,15 94,20 94,30 86,35 78,30" fill="url(#bb-blue)"/><polygon points="78,40 86,35 94,40 94,50 86,55 78,50" fill="url(#bb-cream)"/></g><g font-family="Inter,sans-serif" font-weight="900" font-size="9" text-anchor="middle"><text x="38" y="38" fill="#f4ecc7">P</text><text x="54" y="48" fill="#1c2238">B</text><text x="22" y="48" fill="#f4ecc7">H</text></g></svg>`,
  };

  const GAMES = [
    { id: 'mastermind',       zone: 'bonus',       title: 'Mastermind',       description: 'Crack the colour code in a limited number of guesses. Two game modes, fully configurable.', href: 'mastermind/index.html',    available: true },
    { id: 'planet-order',     zone: 'futuristic',  title: 'Planet Order',     description: 'Arrange the planets in the correct order from the Sun. Feedback mode and hints.', href: 'planet-order/index.html',  available: true },
    { id: 'countdown',        zone: 'futuristic',  title: 'Countdown',        description: 'Press every numbered button from 100 down to 1. One wrong click and you lock in.', href: 'countdown/index.html',     available: true  },
    { id: 'stop-clock',       zone: 'industrial',  title: 'Stop Clock',       description: 'Stop every clock in the room at exactly 28 seconds — different clocks, different speeds.', href: 'stop-clock/index.html',   available: true  },
    { id: 'symbol-wheels',    zone: 'aztec',       title: 'Symbol Wheels',    description: 'Rotate concentric wheels so every adjacent symbol matches.', href: 'symbol-wheels/index.html', available: true  },
    { id: 'number-tower',     zone: 'eastern',     title: 'Number Tower',     description: 'Rotate the blocks so each side of the tower sums to a target.', href: 'number-tower/index.html',  available: true  },
    { id: 'numeral-grid',     zone: 'medieval',    title: 'Numeral Grid',     description: 'Arrange Roman numerals in a 3×3 grid so each 2×2 block hits the target sum.', href: 'numeral-grid/index.html',     available: true },
    { id: 'tube-spectrum',    zone: 'futuristic',  title: 'Tube Spectrum',    description: 'Reorder coloured tubes to reconstruct the correct colour spectrum.', href: 'tube-spectrum/index.html',    available: true },
    { id: 'synonym-dominoes', zone: 'medieval',    title: 'Synonym Dominoes', description: 'Chain dominoes end-to-end so every adjacent pair of words are synonyms.', href: 'synonym-dominoes/index.html', available: true },
    { id: 'word-chain',       zone: 'medieval',    title: 'Word Chain',       description: 'Arrange words so each one\u2019s first letter matches the previous word\u2019s last.', href: 'word-chain/index.html',       available: true },
    { id: 'pipework',         zone: 'industrial',  title: 'Pipework',         description: 'Rotate pipe tiles to connect the inlet to the outlet.', href: 'pipework/index.html',         available: true },
    { id: 'block-grid',       zone: 'futuristic',  title: 'Block Grid',       description: 'Nonogram-style: fill grid cells to match the row and column clues.', href: 'block-grid/index.html',       available: true },
    { id: 'blockbusters',     zone: 'bonus',       title: 'Blockbusters',     description: 'The 90s ITV quiz, live online. Host a room, friends buzz in on their phones — Blue pair vs solo White, then the 60-second Gold Run.', href: 'blockbusters/index.html', available: true },
    { id: 'the-wall',         zone: 'bonus',       title: 'The Wall',         description: 'Danny Dyer’s giant Plinko wall. Green balls add. Red balls subtract. Three rounds, up to £1,000,000 a drop.', href: 'the-wall/index.html', available: true },
  ];

  const grid = document.getElementById('grid');
  const filters = document.getElementById('filters');
  const statsEl = document.getElementById('stats');
  let currentZone = 'all';

  function renderStats() {
    const records = loadRecords();
    const totalWins = Object.values(records).reduce((n, r) => n + (r.wins || 0), 0);
    const gamesWithRecords = new Set();
    for (const key of Object.keys(records)) gamesWithRecords.add(key.split(':')[0]);
    const available = GAMES.filter(g => g.available).length;
    const total = GAMES.length;
    statsEl.innerHTML = `
      <div class="stat"><div class="stat-num accent">${available}<span style="opacity:0.4">/${total}</span></div><div class="stat-label">Games Ready</div></div>
      <div class="stat"><div class="stat-num">${totalWins}</div><div class="stat-label">Total Wins</div></div>
      <div class="stat"><div class="stat-num gold">${gamesWithRecords.size}</div><div class="stat-label">Games Played</div></div>
    `;
  }

  function renderGrid() {
    grid.innerHTML = '';
    const visible = GAMES.filter(g => currentZone === 'all' || g.zone === currentZone);
    for (const g of visible) {
      const card = g.available ? document.createElement('a') : document.createElement('div');
      card.className = 'card zone-' + g.zone + (g.available ? '' : ' coming-soon');
      if (g.available) card.href = g.href;

      const header = document.createElement('div');
      header.className = 'card-header';
      header.innerHTML = ILLO[g.id] || '';
      const tag = document.createElement('div');
      tag.className = 'zone-tag';
      tag.textContent = g.zone === 'bonus' ? 'Bonus' : g.zone;
      header.appendChild(tag);
      card.appendChild(header);

      const body = document.createElement('div');
      body.className = 'card-body';
      const h = document.createElement('h3');
      h.textContent = g.title;
      body.appendChild(h);
      const p = document.createElement('p');
      p.textContent = g.description;
      body.appendChild(p);

      const footer = document.createElement('div');
      footer.className = 'card-footer';
      const bestEl = document.createElement('div');
      bestEl.className = 'best-pill';
      const rec = getBestAcrossConfigs(g.id);
      if (rec.bestSeconds != null) {
        bestEl.textContent = formatTime(rec.bestSeconds);
      } else {
        bestEl.classList.add('none');
        bestEl.textContent = g.available ? 'No record' : '—';
      }
      footer.appendChild(bestEl);

      const btn = document.createElement('span');
      btn.className = 'play-btn' + (g.available ? '' : ' disabled');
      btn.textContent = g.available ? 'Play' : 'Coming soon';
      footer.appendChild(btn);

      body.appendChild(footer);
      card.appendChild(body);
      grid.appendChild(card);
    }
  }

  filters.addEventListener('click', (e) => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    currentZone = btn.dataset.zone;
    document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b === btn));
    renderGrid();
  });

  renderStats();
  renderGrid();
</script>
</body>
</html>
