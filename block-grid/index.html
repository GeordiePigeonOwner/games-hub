<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block Grid</title>
<style>
:root{--bg-0:#0b0f1e;--bg-1:#131831;--bg-2:#1a2040;--surface:#1d2442;--surface-2:#252c52;--surface-hi:#2e376a;--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.14);--text:#eef1ff;--text-dim:rgba(238,241,255,0.62);--text-faint:rgba(238,241,255,0.38);--accent:#6ac9ff;--accent-2:#9a7bff;--success:#3ed598;--gold:#ffd77a;--danger:#ff6b6b;--r-sm:8px;--r-md:12px;--r-lg:16px;--shadow-sm:0 2px 8px rgba(0,0,0,0.25);--shadow-md:0 8px 24px rgba(0,0,0,0.35);--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;--ease:cubic-bezier(0.4,0,0.2,1);}
*{box-sizing:border-box;}html,body{height:100%;}
body{margin:0;font-family:var(--font-sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(106,201,255,0.14),transparent 60%),radial-gradient(ellipse 60% 60% at 80% 100%,rgba(154,123,255,0.1),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);background-attachment:fixed;}
h1{margin:0 0 8px;font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
@supports ((-webkit-background-clip:text) or (background-clip:text)){h1{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}}
.sub{color:var(--text-dim);margin:0 0 24px;font-size:15px;text-align:center;max-width:560px;}
.back-link{position:fixed;top:20px;left:20px;color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm);background:rgba(29,36,66,0.7);border:1px solid var(--border);transition:all 0.2s var(--ease);z-index:10;}
.back-link:hover{color:var(--text);background:rgba(46,55,106,0.8);border-color:var(--border-hi);transform:translateX(-2px);}
.settings{background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:20px;display:grid;grid-template-columns:max-content 1fr;gap:14px 24px;align-items:center;box-shadow:var(--shadow-sm);transition:opacity 0.2s var(--ease);max-width:520px;width:100%;}
.settings.locked{opacity:0.45;pointer-events:none;}
.settings label{font-size:13px;color:var(--text-dim);font-weight:500;}
button{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);color:#0a1020;border:none;padding:11px 20px;border-radius:var(--r-sm);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.15s var(--ease);box-shadow:0 2px 8px rgba(106,201,255,0.25);}
button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(106,201,255,0.4);}
button:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
button.big{padding:13px 32px;font-size:15px;}
button.ghost{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border-hi);box-shadow:none;}
button.ghost:hover:not(:disabled){background:rgba(255,255,255,0.08);box-shadow:none;}
.pill-group{display:inline-flex;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;}
.pill{background:transparent;color:var(--text-dim);border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:none;}
button.pill:hover:not(:disabled){color:var(--text);background:rgba(255,255,255,0.04);transform:none;box-shadow:none;}
button.pill.active{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);color:#0a1020;}
.timer-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:520px;margin-bottom:12px;padding:12px 18px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-md);}
.timer{font-family:var(--font-mono);font-size:20px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}
.meta{font-size:13px;color:var(--text-dim);font-weight:500;}
.status{margin-top:18px;text-align:center;min-height:24px;font-size:15px;color:var(--text);font-weight:500;}
.status .new-best{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:10px;background:linear-gradient(135deg,#ffd77a,#ff9d4a);color:#1a0f00;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.hidden{display:none !important;}

.board{background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow-md);}
.board.idle{padding:48px 24px;display:flex;align-items:center;justify-content:center;min-height:220px;min-width:340px;}
.idle-msg{color:var(--text-faint);font-size:14px;text-align:center;}

.nono-wrap{display:grid;gap:2px;}
.nono-row{display:flex;align-items:flex-end;gap:0;}

.col-clues{display:grid;gap:2px;}
.col-clue{
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  padding:4px 2px;min-height:60px;
  font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text-dim);
  line-height:1.15;
}
.col-clue.done{color:var(--success);}
.col-clue span{font-variant-numeric:tabular-nums;}

.row-clue{
  display:flex;align-items:center;justify-content:flex-end;gap:5px;padding-right:8px;
  font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--text-dim);
  min-width:56px;
}
.row-clue.done{color:var(--success);}

.cells-grid{display:grid;gap:2px;}
.cell{
  background:linear-gradient(180deg,var(--bg-2),var(--surface-2));
  border:1px solid var(--border-hi);
  border-radius:3px;
  cursor:pointer;
  transition:background 0.1s,transform 0.05s;
  user-select:none;
  position:relative;
}
.cell:hover{border-color:rgba(106,201,255,0.4);}
.cell.filled{
  background:linear-gradient(135deg,#6ac9ff,#9a7bff);
  border-color:rgba(255,255,255,0.2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),0 2px 4px rgba(0,0,0,0.3);
}
.cell.marked::before{
  content:'×';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--danger);font-size:18px;font-weight:700;font-family:var(--font-mono);
  pointer-events:none;
}

.controls{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

.instructions{color:var(--text-faint);font-size:12px;margin-top:10px;text-align:center;}
</style>
</head>
<body>
  <script>
window.GameFramework=(function(){
function formatTime(t){const m=Math.floor(t/60).toString().padStart(2,'0'),s=(Math.floor(t)%60).toString().padStart(2,'0');return m+':'+s;}
function createTimer(o){let st=0,el=0,iv=null;const d=o.display,lim=o.limitSeconds||0;function r(){if(!d)return;if(lim>0){const rem=Math.max(0,lim-el);d.textContent=formatTime(rem);d.style.color=rem<=10?'var(--danger)':'var(--accent)';}else{d.textContent=formatTime(el);d.style.color='var(--accent)';}}const api={start(){api.stop();st=Date.now();el=0;r();iv=setInterval(function(){el=Math.floor((Date.now()-st)/1000);r();if(o.onTick)o.onTick(el);if(lim>0&&el>=lim){api.stop();if(o.onExpire)o.onExpire();}},250);},stop(){if(iv){clearInterval(iv);iv=null;}},reset(){api.stop();el=0;r();},get elapsed(){return el;}};return api;}
const K='gamesCreation.records.v1';
function load(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):{};}catch(e){return{};}}
function save(r){try{localStorage.setItem(K,JSON.stringify(r));}catch(e){}}
function recordWin(g,s,c){const a=load();const k=c?g+':'+c:g;const e=a[k]||{wins:0};const nb=e.bestSeconds==null||s<e.bestSeconds;a[k]={bestSeconds:nb?s:e.bestSeconds,wins:(e.wins||0)+1,lastPlayed:Date.now()};save(a);return{isNewBest:nb};}
function injectBackLink(h){const a=document.createElement('a');a.className='back-link';a.href=h||'../index.html';a.textContent='\u2190 Menu';document.body.appendChild(a);}
return{formatTime:formatTime,createTimer:createTimer,recordWin:recordWin,injectBackLink:injectBackLink};
})();
GameFramework.injectBackLink();
GameFramework.sfx=(function(){let ctx=null;function ac(){try{if(!ctx){const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;ctx=new A();}if(ctx.state==='suspended')ctx.resume();return ctx;}catch(e){return null;}}
function tone(f,ty,dur,del,vol){const c=ac();if(!c)return;try{const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+(del||0);o.type=ty;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol,t+0.015);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+0.05);}catch(e){}}
return{click:function(){tone(660,'square',0.06,0,0.04);},win:function(){tone(523.25,'sine',0.16,0,0.1);tone(659.25,'sine',0.16,0.11,0.1);tone(783.99,'sine',0.28,0.22,0.1);},lose:function(){tone(330,'sine',0.18,0,0.08);tone(247,'sine',0.3,0.15,0.08);}};})();
</script>

  <h1>Block Grid</h1>
  <div class="sub">Fill cells to match the row and column clues (nonogram)</div>

  <div class="settings" id="settings">
    <label>Grid size:</label>
    <div class="pill-group" id="sizeToggle">
      <button class="pill active" data-size="5">5 × 5</button>
      <button class="pill" data-size="7">7 × 7</button>
      <button class="pill" data-size="10">10 × 10</button>
    </div>

    <label>Density:</label>
    <div class="pill-group" id="densityToggle">
      <button class="pill" data-density="easy">Easy</button>
      <button class="pill active" data-density="normal">Normal</button>
      <button class="pill" data-density="dense">Dense</button>
    </div>
  </div>

  <div class="timer-bar">
    <div class="meta" id="progressMeta">Not started</div>
    <div class="timer" id="timerDisplay">00:00</div>
  </div>

  <div class="board idle" id="board">
    <div class="idle-msg">Press <b>Start Game</b> to begin</div>
  </div>

  <div class="instructions">Left-click = fill. Right-click = mark × (empty).</div>

  <div class="controls">
    <button id="startBtn" class="big">Start Game</button>
    <button id="resetBtn" class="ghost hidden">Reset</button>
  </div>

  <div class="status" id="status"></div>

<script>
  let size = 5;
  let target = [];    // 2D bool [rows][cols]
  let state = [];     // 2D int per cell: 0=empty, 1=filled, 2=marked
  let rowClues = [];
  let colClues = [];
  let gameState = 'idle';
  let timer = null;

  const $ = (id) => document.getElementById(id);
  const boardEl = $('board'), settingsEl = $('settings');
  const startBtn = $('startBtn'), resetBtn = $('resetBtn');
  const statusEl = $('status'), progressMeta = $('progressMeta');
  const timerDisplay = $('timerDisplay');
  const sizeToggle = $('sizeToggle');

  let currentSize = 5;
  sizeToggle.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      if (gameState === 'playing') return;
      currentSize = parseInt(b.dataset.size, 10);
      sizeToggle.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    });
  });

  // Fill density of the target picture: Easy ~40%, Normal ~50%, Dense ~60%.
  const DENSITIES = { easy: 0.4, normal: 0.5, dense: 0.6 };
  const densityToggle = $('densityToggle');
  let currentDensity = 'normal';
  densityToggle.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      if (gameState === 'playing') return;
      currentDensity = b.dataset.density;
      densityToggle.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    });
  });

  function generateTarget(n, density) {
    const g = Array.from({length:n}, () =>
      Array.from({length:n}, () => Math.random() < density));
    // ensure at least one cell filled in each row/col — retry if not
    for (let r = 0; r < n; r++) if (!g[r].some(v => v)) g[r][Math.floor(Math.random()*n)] = true;
    for (let c = 0; c < n; c++) {
      let has = false;
      for (let r = 0; r < n; r++) if (g[r][c]) { has = true; break; }
      if (!has) g[Math.floor(Math.random()*n)][c] = true;
    }
    return g;
  }

  function cluesForLine(line) {
    const clues = [];
    let run = 0;
    for (const v of line) {
      if (v) run++;
      else if (run > 0) { clues.push(run); run = 0; }
    }
    if (run > 0) clues.push(run);
    return clues.length ? clues : [0];
  }

  function startGame() {
    size = currentSize;
    target = generateTarget(size, DENSITIES[currentDensity] || 0.5);
    state = Array.from({length:size}, () => Array(size).fill(0));
    rowClues = target.map(row => cluesForLine(row));
    colClues = [];
    for (let c = 0; c < size; c++) {
      const col = target.map(r => r[c]);
      colClues.push(cluesForLine(col));
    }
    gameState = 'playing';
    statusEl.textContent = '';

    settingsEl.classList.add('locked');
    startBtn.classList.add('hidden');
    resetBtn.classList.remove('hidden');
    resetBtn.textContent = 'Reset';

    timer = window.GameFramework.createTimer({ display: timerDisplay });
    timer.start();
    render();
  }

  function render() {
    boardEl.innerHTML = '';
    boardEl.classList.remove('idle');

    const cellSize = size <= 5 ? 44 : (size <= 7 ? 38 : 30);
    const colCluePadding = 60;
    const rowCluePadding = 60;

    const wrap = document.createElement('div');
    wrap.className = 'nono-wrap';
    wrap.style.gridTemplateColumns = `${rowCluePadding}px 1fr`;
    wrap.style.gridTemplateRows    = `${colCluePadding}px 1fr`;

    // empty corner
    const corner = document.createElement('div');
    wrap.appendChild(corner);

    // top column clues row
    const colCluesWrap = document.createElement('div');
    colCluesWrap.className = 'col-clues';
    colCluesWrap.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
    for (let c = 0; c < size; c++) {
      const cc = document.createElement('div');
      cc.className = 'col-clue' + (colMatches(c) ? ' done' : '');
      for (const n of colClues[c]) {
        const s = document.createElement('span');
        s.textContent = n;
        cc.appendChild(s);
      }
      colCluesWrap.appendChild(cc);
    }
    wrap.appendChild(colCluesWrap);

    // row clues column
    const rowCluesWrap = document.createElement('div');
    rowCluesWrap.style.display = 'grid';
    rowCluesWrap.style.gap = '2px';
    rowCluesWrap.style.gridTemplateRows = `repeat(${size}, ${cellSize}px)`;
    for (let r = 0; r < size; r++) {
      const rc = document.createElement('div');
      rc.className = 'row-clue' + (rowMatches(r) ? ' done' : '');
      rc.textContent = rowClues[r].join(' ');
      rowCluesWrap.appendChild(rc);
    }
    wrap.appendChild(rowCluesWrap);

    // cells grid
    const grid = document.createElement('div');
    grid.className = 'cells-grid';
    grid.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
    grid.style.gridAutoRows = `${cellSize}px`;

    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (state[r][c] === 1) cell.classList.add('filled');
        if (state[r][c] === 2) cell.classList.add('marked');
        // thicker border every 5 cells
        if ((c + 1) % 5 === 0 && c < size - 1) cell.style.marginRight = '2px';
        if ((r + 1) % 5 === 0 && r < size - 1) cell.style.marginBottom = '2px';

        cell.addEventListener('click', (e) => onClick(r, c, e));
        cell.addEventListener('contextmenu', (e) => { e.preventDefault(); onRightClick(r, c); });
        grid.appendChild(cell);
      }
    }
    wrap.appendChild(grid);
    boardEl.appendChild(wrap);

    // progress
    const rowsDone = [...Array(size).keys()].filter(rowMatches).length;
    const colsDone = [...Array(size).keys()].filter(colMatches).length;
    progressMeta.textContent = `Rows ${rowsDone}/${size} · Cols ${colsDone}/${size}`;
  }

  function onClick(r, c, e) {
    if (gameState !== 'playing') return;
    state[r][c] = state[r][c] === 1 ? 0 : 1;
    render();
    if (isComplete()) win();
  }
  function onRightClick(r, c) {
    if (gameState !== 'playing') return;
    state[r][c] = state[r][c] === 2 ? 0 : 2;
    render();
  }

  function rowMatches(r) {
    const line = state[r].map(v => v === 1);
    const clue = cluesForLine(line);
    return JSON.stringify(clue) === JSON.stringify(rowClues[r]);
  }
  function colMatches(c) {
    const line = state.map(row => row[c] === 1);
    const clue = cluesForLine(line);
    return JSON.stringify(clue) === JSON.stringify(colClues[c]);
  }

  function isComplete() {
    for (let r = 0; r < size; r++)
      for (let c = 0; c < size; c++)
        if (!!target[r][c] !== (state[r][c] === 1)) return false;
    return true;
  }

  function win() {
    gameState = 'over'; timer.stop();
    GameFramework.sfx.win();
    const configKey = `${size}x${size}-${currentDensity}`;
    const res = window.GameFramework.recordWin('block-grid', timer.elapsed, configKey);
    const nb = res.isNewBest ? '<span class="new-best">NEW BEST</span>' : '';
    statusEl.innerHTML = `Grid solved in ${window.GameFramework.formatTime(timer.elapsed)} ${nb}`;
    startBtn.classList.remove('hidden'); startBtn.textContent = 'Play Again';
    resetBtn.textContent = 'Change Settings';
  }

  function resetIdle() {
    if (timer) timer.reset();
    gameState = 'idle';
    target = []; state = []; rowClues = []; colClues = [];
    settingsEl.classList.remove('locked');
    startBtn.classList.remove('hidden'); startBtn.textContent = 'Start Game';
    resetBtn.classList.add('hidden');
    boardEl.classList.add('idle');
    boardEl.innerHTML = '<div class="idle-msg">Press <b>Start Game</b> to begin</div>';
    progressMeta.textContent = 'Not started';
    timerDisplay.textContent = '00:00';
    statusEl.textContent = '';
  }

  startBtn.addEventListener('click', startGame);
  resetBtn.addEventListener('click', resetIdle);
</script>
</body>
</html>
