<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipework</title>
<style>
:root{--bg-0:#0b0f1e;--bg-1:#131831;--bg-2:#1a2040;--surface:#1d2442;--surface-2:#252c52;--surface-hi:#2e376a;--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.14);--text:#eef1ff;--text-dim:rgba(238,241,255,0.62);--text-faint:rgba(238,241,255,0.38);--accent:#6ac9ff;--accent-2:#9a7bff;--industrial:#a4b0ba;--success:#3ed598;--gold:#ffd77a;--danger:#ff6b6b;--r-sm:8px;--r-md:12px;--r-lg:16px;--shadow-sm:0 2px 8px rgba(0,0,0,0.25);--shadow-md:0 8px 24px rgba(0,0,0,0.35);--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;--ease:cubic-bezier(0.4,0,0.2,1);}
*{box-sizing:border-box;}html,body{height:100%;}
body{margin:0;font-family:var(--font-sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(164,176,186,0.12),transparent 60%),radial-gradient(ellipse 60% 60% at 80% 100%,rgba(106,201,255,0.1),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);background-attachment:fixed;}
h1{margin:0 0 8px;font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
@supports ((-webkit-background-clip:text) or (background-clip:text)){h1{background:linear-gradient(135deg,#a4b0ba 0%,#d8dfe5 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}}
.sub{color:var(--text-dim);margin:0 0 24px;font-size:15px;text-align:center;max-width:620px;}
.back-link{position:fixed;top:20px;left:20px;color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm);background:rgba(29,36,66,0.7);border:1px solid var(--border);transition:all 0.2s var(--ease);z-index:10;}
.back-link:hover{color:var(--text);background:rgba(46,55,106,0.8);border-color:var(--border-hi);transform:translateX(-2px);}
.settings{background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:20px;display:grid;grid-template-columns:max-content 1fr;gap:14px 24px;align-items:center;box-shadow:var(--shadow-sm);transition:opacity 0.2s var(--ease);max-width:460px;width:100%;}
.settings.locked{opacity:0.45;pointer-events:none;}
.settings label{font-size:13px;color:var(--text-dim);font-weight:500;}
button{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);color:#0a1020;border:none;padding:11px 20px;border-radius:var(--r-sm);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.15s var(--ease);box-shadow:0 2px 8px rgba(106,201,255,0.25);}
button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(106,201,255,0.4);}
button:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
button.big{padding:13px 32px;font-size:15px;}
button.ghost{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border-hi);box-shadow:none;}
button.ghost:hover:not(:disabled){background:rgba(255,255,255,0.08);box-shadow:none;}
.pill-group{display:inline-flex;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;}
.pill{background:transparent;color:var(--text-dim);border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:none;}
button.pill:hover:not(:disabled){color:var(--text);background:rgba(255,255,255,0.04);transform:none;box-shadow:none;}
button.pill.active{background:linear-gradient(135deg,#a4b0ba 0%,#d8dfe5 100%);color:#1a1f26;}
.timer-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:460px;margin-bottom:12px;padding:12px 18px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-md);}
.timer{font-family:var(--font-mono);font-size:20px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}
.meta{font-size:13px;color:var(--text-dim);font-weight:500;}
.status{margin-top:18px;text-align:center;min-height:24px;font-size:15px;color:var(--text);font-weight:500;}
.status .new-best{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:10px;background:linear-gradient(135deg,#ffd77a,#ff9d4a);color:#1a0f00;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.hidden{display:none !important;}
.board{background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow-md);display:flex;flex-direction:column;align-items:center;gap:14px;}
.board.idle{padding:48px 24px;min-height:220px;min-width:340px;justify-content:center;}
.idle-msg{color:var(--text-faint);font-size:14px;text-align:center;}

.pipe-grid{
  display:grid;
  background:linear-gradient(135deg,#1a1f2e,#0e1220);
  border:2px solid var(--border-hi);
  border-radius:var(--r-md);
  padding:4px;
  gap:2px;
}
.pipe-cell{
  background:radial-gradient(circle at 30% 30%,#262d44,#1a1f35);
  border-radius:4px;
  cursor:pointer;
  transition:background 0.15s var(--ease);
  position:relative;
  overflow:hidden;
}
.pipe-cell:hover{background:radial-gradient(circle at 30% 30%,#2f3754,#222840);}
.pipe-cell.empty{cursor:default;}
.pipe-cell.fixed{cursor:default;background:radial-gradient(circle at 30% 30%,#3a4058,#252c42);}
.pipe-cell.flowing svg .pipe-path{stroke:var(--success);filter:drop-shadow(0 0 4px rgba(62,213,152,0.6));}
.pipe-cell svg{width:100%;height:100%;display:block;}
.pipe-path{stroke:#a4b0ba;stroke-width:14;stroke-linecap:round;fill:none;transition:stroke 0.2s var(--ease);}

.edge-badge{
  font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:0.1em;
}
.edge-badge.start{background:rgba(62,213,152,0.15);color:var(--success);border:1px solid rgba(62,213,152,0.3);}
.edge-badge.end{background:rgba(255,215,122,0.15);color:var(--gold);border:1px solid rgba(255,215,122,0.3);}

.controls{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.instructions{color:var(--text-faint);font-size:12px;margin-top:6px;text-align:center;}
</style>
</head>
<body>
  <script>
window.GameFramework=(function(){
function formatTime(t){const m=Math.floor(t/60).toString().padStart(2,'0'),s=(Math.floor(t)%60).toString().padStart(2,'0');return m+':'+s;}
function createTimer(o){let st=0,el=0,iv=null;const d=o.display,lim=o.limitSeconds||0;function r(){if(!d)return;if(lim>0){const rem=Math.max(0,lim-el);d.textContent=formatTime(rem);d.style.color=rem<=10?'var(--danger)':'var(--accent)';}else{d.textContent=formatTime(el);d.style.color='var(--accent)';}}const api={start(){api.stop();st=Date.now();el=0;r();iv=setInterval(function(){el=Math.floor((Date.now()-st)/1000);r();if(o.onTick)o.onTick(el);if(lim>0&&el>=lim){api.stop();if(o.onExpire)o.onExpire();}},250);},stop(){if(iv){clearInterval(iv);iv=null;}},reset(){api.stop();el=0;r();},get elapsed(){return el;}};return api;}
const K='gamesCreation.records.v1';
function load(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):{};}catch(e){return{};}}
function save(r){try{localStorage.setItem(K,JSON.stringify(r));}catch(e){}}
function recordWin(g,s,c){const a=load();const k=c?g+':'+c:g;const e=a[k]||{wins:0};const nb=e.bestSeconds==null||s<e.bestSeconds;a[k]={bestSeconds:nb?s:e.bestSeconds,wins:(e.wins||0)+1,lastPlayed:Date.now()};save(a);return{isNewBest:nb};}
function injectBackLink(h){const a=document.createElement('a');a.className='back-link';a.href=h||'../index.html';a.textContent='\u2190 Menu';document.body.appendChild(a);}
return{formatTime:formatTime,createTimer:createTimer,recordWin:recordWin,injectBackLink:injectBackLink};
})();
GameFramework.injectBackLink();
</script>

  <h1>Pipework</h1>
  <div class="sub">Rotate the pipes to connect the green inlet to the gold outlet. Click a pipe to rotate it 90°.</div>

  <div class="settings" id="settings">
    <label>Grid:</label>
    <div class="pill-group" id="sizeToggle">
      <button class="pill active" data-size="4">4 × 4</button>
      <button class="pill" data-size="5">5 × 5</button>
      <button class="pill" data-size="6">6 × 6</button>
    </div>
  </div>

  <div class="timer-bar">
    <div class="meta" id="progressMeta">Not started</div>
    <div class="timer" id="timerDisplay">00:00</div>
  </div>

  <div class="board idle" id="board">
    <div class="idle-msg">Press <b>Start Game</b> to begin</div>
  </div>

  <div class="controls">
    <button id="startBtn" class="big">Start Game</button>
    <button id="resetBtn" class="ghost hidden">Reset</button>
  </div>

  <div class="status" id="status"></div>

<script>
  // Directions: N=0, E=1, S=2, W=3
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];
  const OPPOSITE = [2, 3, 0, 1];

  let size = 4;
  let grid = [];          // each cell: { dirs: Set<int 0..3> or null (empty), fixed: bool }
  let gameState = 'idle';
  let timer = null;

  const $ = (id) => document.getElementById(id);
  const boardEl = $('board'), settingsEl = $('settings');
  const startBtn = $('startBtn'), resetBtn = $('resetBtn');
  const statusEl = $('status'), progressMeta = $('progressMeta');
  const timerDisplay = $('timerDisplay');
  const sizeToggle = $('sizeToggle');

  let currentSize = 4;
  sizeToggle.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      if (gameState === 'playing') return;
      currentSize = parseInt(b.dataset.size, 10);
      sizeToggle.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    });
  });

  // Generate a random path from (0,0) to (size-1, size-1) that only uses corners/straights
  function generatePath(n) {
    for (let attempt = 0; attempt < 30; attempt++) {
      const path = [[0, 0]];
      const visited = new Set(['0,0']);
      let r = 0, c = 0;
      let safety = 0;
      while (!(r === n - 1 && c === n - 1) && safety++ < 200) {
        const candidates = [];
        for (let d = 0; d < 4; d++) {
          const nr = r + DY[d], nc = c + DX[d];
          if (nr < 0 || nr >= n || nc < 0 || nc >= n) continue;
          if (visited.has(nr + ',' + nc)) continue;
          candidates.push([d, nr, nc]);
        }
        if (!candidates.length) break;
        let pick;
        if (Math.random() < 0.7) {
          // biased towards target
          const sorted = candidates.slice().sort(([,ra,ca], [,rb,cb]) => {
            return (Math.abs((n-1)-ra) + Math.abs((n-1)-ca)) -
                   (Math.abs((n-1)-rb) + Math.abs((n-1)-cb));
          });
          pick = sorted[0];
        } else {
          pick = candidates[Math.floor(Math.random() * candidates.length)];
        }
        r = pick[1]; c = pick[2];
        visited.add(r + ',' + c);
        path.push([r, c]);
      }
      if (r === n - 1 && c === n - 1 && path.length >= n) return path;
    }
    return null;
  }

  function directionBetween(a, b) {
    // direction from cell a to cell b (neighbor)
    const dr = b[0] - a[0], dc = b[1] - a[1];
    if (dr === -1) return 0; // N
    if (dc === 1)  return 1; // E
    if (dr === 1)  return 2; // S
    if (dc === -1) return 3; // W
    return -1;
  }

  function buildGrid(n) {
    const path = generatePath(n);
    if (!path) return null;
    const g = Array.from({length:n}, () => Array(n).fill(null).map(() => ({ dirs: null, fixed: false })));

    // Set up path cells
    for (let i = 0; i < path.length; i++) {
      const [r, c] = path[i];
      const dirs = new Set();
      if (i > 0) dirs.add(directionBetween([r,c], path[i - 1])); // prev direction
      if (i < path.length - 1) dirs.add(directionBetween([r,c], path[i + 1])); // next direction
      // start has only 1 internal dir, add external (W for left edge) to mark inlet
      if (i === 0) dirs.add(3); // W (inlet from left)
      if (i === path.length - 1) dirs.add(1); // E (outlet to right)
      g[r][c].dirs = dirs;
    }

    // Fix start and end
    g[0][0].fixed = true;
    g[n-1][n-1].fixed = true;

    // Randomize rotations for non-fixed cells (rotate 1-3 times CW)
    for (const [r, c] of path) {
      if (g[r][c].fixed) continue;
      const rots = 1 + Math.floor(Math.random() * 3);
      for (let k = 0; k < rots; k++) {
        g[r][c].dirs = new Set([...g[r][c].dirs].map(d => (d + 1) % 4));
      }
    }

    return g;
  }

  function startGame() {
    size = currentSize;
    grid = buildGrid(size);
    if (!grid) { statusEl.textContent = 'Could not generate — try again.'; return; }

    gameState = 'playing';
    statusEl.textContent = '';
    settingsEl.classList.add('locked');
    startBtn.classList.add('hidden');
    resetBtn.classList.remove('hidden');
    resetBtn.textContent = 'Reset';

    timer = window.GameFramework.createTimer({ display: timerDisplay });
    timer.start();
    render();
  }

  function rotateCell(r, c) {
    if (gameState !== 'playing') return;
    const cell = grid[r][c];
    if (!cell.dirs || cell.fixed) return;
    cell.dirs = new Set([...cell.dirs].map(d => (d + 1) % 4));
    render();
    if (isConnected()) win();
  }

  // BFS from (0,0) following pipes. Connected if reach (size-1, size-1).
  function flowReach() {
    const n = size;
    const flowing = new Set();
    const q = [[0, 0]];
    flowing.add('0,0');
    while (q.length) {
      const [r, c] = q.shift();
      const cell = grid[r][c];
      if (!cell.dirs) continue;
      for (const d of cell.dirs) {
        if (d === 3 && r === 0 && c === 0) continue; // external W at inlet — don't flow outside
        if (d === 1 && r === n-1 && c === n-1) continue; // external E at outlet
        const nr = r + DY[d], nc = c + DX[d];
        if (nr < 0 || nr >= n || nc < 0 || nc >= n) continue;
        if (flowing.has(nr + ',' + nc)) continue;
        const nCell = grid[nr][nc];
        if (!nCell.dirs) continue;
        if (!nCell.dirs.has(OPPOSITE[d])) continue;
        flowing.add(nr + ',' + nc);
        q.push([nr, nc]);
      }
    }
    return flowing;
  }
  function isConnected() {
    return flowReach().has((size-1) + ',' + (size-1));
  }

  function render() {
    boardEl.innerHTML = '';
    boardEl.classList.remove('idle');

    const inletLabel = document.createElement('div');
    inletLabel.className = 'edge-badge start';
    inletLabel.textContent = '▶ INLET';
    boardEl.appendChild(inletLabel);

    const flowing = flowReach();

    const tile = size <= 4 ? 70 : (size === 5 ? 60 : 50);
    const gridEl = document.createElement('div');
    gridEl.className = 'pipe-grid';
    gridEl.style.gridTemplateColumns = `repeat(${size}, ${tile}px)`;
    gridEl.style.gridAutoRows = `${tile}px`;

    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const cell = grid[r][c];
        const cellEl = document.createElement('div');
        cellEl.className = 'pipe-cell';
        if (!cell.dirs) cellEl.classList.add('empty');
        else {
          if (cell.fixed) cellEl.classList.add('fixed');
          if (flowing.has(r + ',' + c)) cellEl.classList.add('flowing');

          // Draw SVG
          const svgNS = 'http://www.w3.org/2000/svg';
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('viewBox', '0 0 100 100');
          svg.setAttribute('preserveAspectRatio', 'none');

          const dirs = [...cell.dirs].filter(d => {
            // External dirs at start/end: don't render (would go off grid)
            if (r === 0 && c === 0 && d === 3) return false;
            if (r === size-1 && c === size-1 && d === 1) return false;
            return true;
          });

          // draw lines from each dir to center
          for (const d of dirs) {
            const path = document.createElementNS(svgNS, 'line');
            path.setAttribute('class', 'pipe-path');
            path.setAttribute('x1', '50');
            path.setAttribute('y1', '50');
            // endpoint
            if (d === 0) { path.setAttribute('x2', '50'); path.setAttribute('y2', '0'); }
            if (d === 1) { path.setAttribute('x2', '100'); path.setAttribute('y2', '50'); }
            if (d === 2) { path.setAttribute('x2', '50'); path.setAttribute('y2', '100'); }
            if (d === 3) { path.setAttribute('x2', '0'); path.setAttribute('y2', '50'); }
            svg.appendChild(path);
          }
          // center dot
          const dot = document.createElementNS(svgNS, 'circle');
          dot.setAttribute('class', 'pipe-path');
          dot.setAttribute('cx', '50'); dot.setAttribute('cy', '50'); dot.setAttribute('r', '5');
          dot.setAttribute('fill', '#a4b0ba');
          dot.setAttribute('stroke', 'none');
          svg.appendChild(dot);
          cellEl.appendChild(svg);

          if (!cell.fixed) {
            cellEl.addEventListener('click', () => rotateCell(r, c));
          }
        }
        gridEl.appendChild(cellEl);
      }
    }
    boardEl.appendChild(gridEl);

    const outletLabel = document.createElement('div');
    outletLabel.className = 'edge-badge end';
    outletLabel.textContent = 'OUTLET ▶';
    boardEl.appendChild(outletLabel);

    const reached = flowing.size;
    progressMeta.textContent = gameState === 'playing'
      ? `Flow reaches ${reached} cells`
      : 'Game over';
  }

  function win() {
    gameState = 'over'; timer.stop();
    const res = window.GameFramework.recordWin('pipework', timer.elapsed, `${size}x${size}`);
    const nb = res.isNewBest ? '<span class="new-best">NEW BEST</span>' : '';
    statusEl.innerHTML = `Pipe flows through in ${window.GameFramework.formatTime(timer.elapsed)} ${nb}`;
    startBtn.classList.remove('hidden'); startBtn.textContent = 'Play Again';
    resetBtn.textContent = 'Change Settings';
    render();
  }

  function resetIdle() {
    if (timer) timer.reset();
    gameState = 'idle'; grid = [];
    settingsEl.classList.remove('locked');
    startBtn.classList.remove('hidden'); startBtn.textContent = 'Start Game';
    resetBtn.classList.add('hidden');
    boardEl.classList.add('idle');
    boardEl.innerHTML = '<div class="idle-msg">Press <b>Start Game</b> to begin</div>';
    progressMeta.textContent = 'Not started';
    timerDisplay.textContent = '00:00';
    statusEl.textContent = '';
  }

  startBtn.addEventListener('click', startGame);
  resetBtn.addEventListener('click', resetIdle);
</script>
</body>
</html>
