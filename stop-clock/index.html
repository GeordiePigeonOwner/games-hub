<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stop Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
:root{--bg-0:#0b0f1e;--bg-1:#131831;--bg-2:#1a2040;--surface:#1d2442;--surface-2:#252c52;--surface-hi:#2e376a;--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.14);--text:#eef1ff;--text-dim:rgba(238,241,255,0.62);--text-faint:rgba(238,241,255,0.38);--accent:#6ac9ff;--accent-2:#9a7bff;--accent-grad:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);--success:#3ed598;--gold:#ffd77a;--danger:#ff6b6b;--warn:#ffb86c;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--shadow-sm:0 2px 8px rgba(0,0,0,0.25);--shadow-md:0 8px 24px rgba(0,0,0,0.35);--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;--ease:cubic-bezier(0.4,0,0.2,1);}
*{box-sizing:border-box;}html,body{height:100%;}
body{margin:0;font-family:var(--font-sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(154,123,255,0.14),transparent 60%),radial-gradient(ellipse 60% 60% at 80% 100%,rgba(106,201,255,0.1),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);background-attachment:fixed;}
h1{margin:0 0 8px;font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
@supports ((-webkit-background-clip:text) or (background-clip:text)){h1{background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}}
h2{margin:0 0 12px;font-size:22px;font-weight:600;}h3{margin:0 0 8px;font-size:18px;font-weight:600;}
.sub{color:var(--text-dim);margin:0 0 24px;font-size:15px;text-align:center;max-width:560px;}
.back-link{position:fixed;top:20px;left:20px;color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm);background:rgba(29,36,66,0.7);border:1px solid var(--border);transition:all 0.2s var(--ease);z-index:10;}
.back-link:hover{color:var(--text);background:rgba(46,55,106,0.8);border-color:var(--border-hi);transform:translateX(-2px);}
.panel{background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-md);}
.settings{background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:20px;display:grid;grid-template-columns:max-content 1fr;gap:14px 24px;align-items:center;box-shadow:var(--shadow-sm);transition:opacity 0.2s var(--ease);max-width:520px;width:100%;}
.settings.locked{opacity:0.45;pointer-events:none;}
.settings label{font-size:13px;color:var(--text-dim);font-weight:500;}
.settings .val{font-weight:700;color:var(--text);margin-left:6px;font-variant-numeric:tabular-nums;}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:var(--bg-2);border-radius:3px;outline:none;border:1px solid var(--border);}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface);box-shadow:0 2px 6px rgba(0,0,0,0.4);}
input[type="range"]:disabled{opacity:0.4;}
input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;}
.settings-row{display:flex;align-items:center;gap:10px;}
button{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);color:#0a1020;border:none;padding:11px 20px;border-radius:var(--r-sm);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.15s var(--ease);box-shadow:0 2px 8px rgba(106,201,255,0.25);}
button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(106,201,255,0.4);}
button:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
button.big{padding:13px 32px;font-size:15px;}
button.ghost{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border-hi);box-shadow:none;}
button.ghost:hover:not(:disabled){background:rgba(255,255,255,0.08);box-shadow:none;}
.pill-group{display:inline-flex;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;}
.pill{background:transparent;color:var(--text-dim);border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:none;transition:all 0.15s var(--ease);}
button.pill:hover:not(:disabled){color:var(--text);background:rgba(255,255,255,0.04);transform:none;box-shadow:none;}
button.pill.active{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);color:#0a1020;box-shadow:0 2px 8px rgba(106,201,255,0.3);}
.timer-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:520px;margin-bottom:12px;padding:12px 18px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-md);}
.timer{font-family:var(--font-mono);font-size:20px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}
.meta,.guess-counter,.attempts{font-size:13px;color:var(--text-dim);font-weight:500;}
.status{margin-top:18px;text-align:center;min-height:24px;font-size:15px;color:var(--text);font-weight:500;}
.status .new-best{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:10px;background:linear-gradient(135deg,#ffd77a,#ff9d4a);color:#1a0f00;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.hidden{display:none !important;}
.board{background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-md);position:relative;}
</style>
<style>
  .settings input[type="range"] { width: 180px; }

  .target-display {
    background: linear-gradient(135deg, rgba(255,215,122,0.12), rgba(255,157,74,0.08));
    border: 1px solid rgba(255,215,122,0.3);
    padding: 12px 24px;
    border-radius: var(--r-md);
    margin-bottom: 14px;
    text-align: center;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .target-display .label { font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  .target-display .time {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }

  .clocks-grid {
    display: grid;
    gap: 20px;
    padding: 24px;
    justify-content: center;
  }

  .clock {
    position: relative;
    width: 150px;
    height: 150px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s var(--ease);
  }
  .clock:hover:not(.stopped) { transform: scale(1.04); }
  .clock.stopped { cursor: default; }

  .clock-face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.06), transparent 50%),
      linear-gradient(180deg, var(--surface-hi), var(--bg-2));
    border: 3px solid var(--border-hi);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.35);
  }
  .clock.stopped.good .clock-face { border-color: var(--success); box-shadow: 0 0 24px rgba(62,213,152,0.35), inset 0 0 20px rgba(0,0,0,0.35); }
  .clock.stopped.bad  .clock-face { border-color: var(--danger);  box-shadow: 0 0 24px rgba(255,107,107,0.35), inset 0 0 20px rgba(0,0,0,0.35); }

  .tick {
    position: absolute;
    top: 6px; left: 50%;
    width: 2px; height: 10px;
    background: rgba(255,255,255,0.35);
    transform-origin: 50% 69px;
  }
  .tick.major { height: 14px; background: rgba(255,255,255,0.65); width: 3px; }

  .numeral {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .hand {
    position: absolute;
    top: 50%; left: 50%;
    width: 3px;
    height: 58px;
    background: linear-gradient(180deg, var(--accent), #6ac9ff);
    border-radius: 2px;
    transform-origin: 50% 100%;
    transform: translate(-50%, -100%) rotate(0deg);
    box-shadow: 0 0 8px rgba(106,201,255,0.5);
  }
  .clock.stopped .hand { background: linear-gradient(180deg, var(--text), #ccc); box-shadow: none; }
  .clock.stopped.good .hand { background: linear-gradient(180deg, var(--success), #2ab887); box-shadow: 0 0 8px rgba(62,213,152,0.5); }
  .clock.stopped.bad  .hand { background: linear-gradient(180deg, var(--danger), #b84848); }

  .center-dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--text);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    z-index: 2;
  }

  .clock-readout {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    background: rgba(0,0,0,0.4);
    padding: 2px 8px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.2s var(--ease);
  }
  .clock.stopped .clock-readout { opacity: 1; }
  .clock.stopped.good .clock-readout { color: var(--success); }
  .clock.stopped.bad  .clock-readout { color: var(--danger); }

  .clock-label {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
  }

  .board { padding: 28px 24px 36px; }
  .board.idle { padding: 48px 24px; display: flex; align-items: center; justify-content: center; min-height: 220px; }
  .idle-msg { color: var(--text-faint); font-size: 14px; text-align: center; }

  .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <script>
window.GameFramework=(function(){
function formatTime(t){const m=Math.floor(t/60).toString().padStart(2,'0'),s=(Math.floor(t)%60).toString().padStart(2,'0');return m+':'+s;}
function createTimer(o){let st=0,el=0,iv=null;const d=o.display,lim=o.limitSeconds||0;function r(){if(!d)return;if(lim>0){const rem=Math.max(0,lim-el);d.textContent=formatTime(rem);d.style.color=rem<=10?'var(--danger)':'var(--accent)';}else{d.textContent=formatTime(el);d.style.color='var(--accent)';}}const api={start(){api.stop();st=Date.now();el=0;r();iv=setInterval(function(){el=Math.floor((Date.now()-st)/1000);r();if(o.onTick)o.onTick(el);if(lim>0&&el>=lim){api.stop();if(o.onExpire)o.onExpire();}},250);},stop(){if(iv){clearInterval(iv);iv=null;}},reset(){api.stop();el=0;r();},get elapsed(){return el;}};return api;}
const K='gamesCreation.records.v1';
function load(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):{};}catch(e){return{};}}
function save(r){try{localStorage.setItem(K,JSON.stringify(r));}catch(e){}}
function recordWin(g,s,c){const a=load();const k=c?g+':'+c:g;const e=a[k]||{wins:0};const nb=e.bestSeconds==null||s<e.bestSeconds;a[k]={bestSeconds:nb?s:e.bestSeconds,wins:(e.wins||0)+1,lastPlayed:Date.now()};save(a);return{isNewBest:nb,bestSeconds:a[k].bestSeconds};}
function getRecord(g){const a=load();const p=g+':';let b=null,w=0,lp=0;for(const k of Object.keys(a)){if(k!==g&&!k.startsWith(p))continue;const r=a[k];w+=r.wins||0;if(r.lastPlayed>lp)lp=r.lastPlayed;if(r.bestSeconds!=null&&(b==null||r.bestSeconds<b))b=r.bestSeconds;}if(w===0&&b==null)return null;return{bestSeconds:b,wins:w,lastPlayed:lp};}
function injectBackLink(h){const a=document.createElement('a');a.className='back-link';a.href=h||'../index.html';a.textContent='\u2190 Menu';document.body.appendChild(a);}
return{formatTime:formatTime,createTimer:createTimer,recordWin:recordWin,getRecord:getRecord,injectBackLink:injectBackLink,loadRecords:load};
})();
GameFramework.injectBackLink();
</script>
  <h1>Stop Clock</h1>
  <div class="sub">Click each clock to stop it at exactly the target time</div>

  <div class="settings" id="settings">
    <label>Number of clocks: <span class="val" id="countVal">4</span></label>
    <input type="range" id="countInput" min="2" max="6" value="4">

    <label>Target time: <span class="val" id="targetVal">28s</span></label>
    <input type="range" id="targetInput" min="10" max="55" value="28">

    <label>Tolerance:</label>
    <div class="pill-group" id="toleranceToggle">
      <button class="pill" data-tolerance="0.5">±0.5s</button>
      <button class="pill active" data-tolerance="1">±1s</button>
      <button class="pill" data-tolerance="2">±2s</button>
      <button class="pill" data-tolerance="3">±3s</button>
    </div>
  </div>

  <div class="target-display">
    <div class="label">Target</div>
    <div class="time" id="targetTimeDisplay">28s ±1s</div>
  </div>

  <div class="timer-bar">
    <div class="meta" id="progressMeta">Not started</div>
    <div class="timer" id="timerDisplay">00:00</div>
  </div>

  <div class="board idle" id="board">
    <div class="idle-msg">Press <b>Start Game</b> to begin</div>
  </div>

  <div class="controls">
    <button id="startBtn" class="big">Start Game</button>
    <button id="resetBtn" class="ghost hidden">Reset</button>
  </div>

  <div class="status" id="status"></div>

<script>
  const config = {
    count: 4,
    targetSeconds: 28,
    tolerance: 1,
  };

  let clocks = []; // { id, startTime, cycleMs, stoppedAt, readSeconds, error, good, el, handEl, readoutEl }
  let gameState = 'idle';
  let timer = null;
  let rafId = null;

  const boardEl = document.getElementById('board');
  const settingsEl = document.getElementById('settings');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const statusEl = document.getElementById('status');
  const progressMeta = document.getElementById('progressMeta');
  const timerDisplay = document.getElementById('timerDisplay');
  const targetTimeDisplay = document.getElementById('targetTimeDisplay');

  const countInput = document.getElementById('countInput');
  const countVal = document.getElementById('countVal');
  const targetInput = document.getElementById('targetInput');
  const targetVal = document.getElementById('targetVal');
  const toleranceToggle = document.getElementById('toleranceToggle');

  let currentTolerance = 1;
  toleranceToggle.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      if (gameState === 'playing') return;
      currentTolerance = parseFloat(b.dataset.tolerance);
      toleranceToggle.querySelectorAll('button').forEach(x =>
        x.classList.toggle('active', x === b));
      updateTargetDisplay();
    });
  });

  function updateSettingsDisplay() {
    countVal.textContent = countInput.value;
    targetVal.textContent = targetInput.value + 's';
    updateTargetDisplay();
  }
  function updateTargetDisplay() {
    targetTimeDisplay.textContent = `${targetInput.value}s ±${currentTolerance}s`;
  }
  [countInput, targetInput].forEach(el => el.addEventListener('input', updateSettingsDisplay));

  function startGame() {
    config.count = parseInt(countInput.value, 10);
    config.targetSeconds = parseInt(targetInput.value, 10);
    config.tolerance = currentTolerance;

    gameState = 'playing';
    statusEl.textContent = '';

    settingsEl.classList.add('locked');
    startBtn.classList.add('hidden');
    resetBtn.classList.remove('hidden');
    resetBtn.textContent = 'Reset';

    renderClocks();

    timer = window.GameFramework.createTimer({ display: timerDisplay });
    timer.start();
    animate();
  }

  function renderClocks() {
    boardEl.innerHTML = '';
    boardEl.classList.remove('idle');
    const grid = document.createElement('div');
    grid.className = 'clocks-grid';

    // choose number of columns
    const cols = config.count <= 3 ? config.count : (config.count <= 4 ? 2 : 3);
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    clocks = [];
    const startTime = performance.now();
    // different cycle durations for each clock (ms for one full rotation = 60s logical)
    // faster cycle = quicker hand. Use distinct-feeling values.
    const cyclePool = [3000, 4500, 6000, 7500, 9000, 11000];

    for (let i = 0; i < config.count; i++) {
      const clockEl = document.createElement('div');
      clockEl.className = 'clock';

      const face = document.createElement('div');
      face.className = 'clock-face';

      // ticks
      for (let t = 0; t < 12; t++) {
        const tick = document.createElement('div');
        tick.className = 'tick' + (t % 3 === 0 ? ' major' : '');
        tick.style.transform = `translateX(-50%) rotate(${t * 30}deg)`;
        face.appendChild(tick);
      }
      clockEl.appendChild(face);

      // small numeral showing 60s scale as "0 / 60"
      const numeral = document.createElement('div');
      numeral.className = 'numeral';
      numeral.textContent = '60';
      clockEl.appendChild(numeral);

      const hand = document.createElement('div');
      hand.className = 'hand';
      clockEl.appendChild(hand);

      const dot = document.createElement('div');
      dot.className = 'center-dot';
      clockEl.appendChild(dot);

      const readout = document.createElement('div');
      readout.className = 'clock-readout';
      readout.textContent = '--';
      clockEl.appendChild(readout);

      const label = document.createElement('div');
      label.className = 'clock-label';
      label.textContent = `#${i + 1}`;
      clockEl.appendChild(label);

      const clockData = {
        id: i,
        startTime,
        cycleMs: cyclePool[i % cyclePool.length],
        stoppedAt: null,
        readSeconds: null,
        error: null,
        good: null,
        el: clockEl,
        handEl: hand,
        readoutEl: readout,
      };

      clockEl.addEventListener('click', () => onClockClick(clockData));
      clocks.push(clockData);
      grid.appendChild(clockEl);
    }

    boardEl.appendChild(grid);
    updateProgress();
  }

  function onClockClick(c) {
    if (gameState !== 'playing' || c.stoppedAt !== null) return;
    c.stoppedAt = performance.now();
    const angle = currentAngle(c, c.stoppedAt);
    c.readSeconds = (angle / 360) * 60;
    c.error = Math.abs(c.readSeconds - config.targetSeconds);
    c.good = c.error <= config.tolerance;
    c.el.classList.add('stopped', c.good ? 'good' : 'bad');
    c.handEl.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;
    c.readoutEl.textContent = c.readSeconds.toFixed(1) + 's';

    updateProgress();

    if (clocks.every(cl => cl.stoppedAt !== null)) finishGame();
  }

  function currentAngle(c, now) {
    const t = (now - c.startTime) % c.cycleMs;
    return (t / c.cycleMs) * 360;
  }

  function animate() {
    if (gameState !== 'playing') return;
    const now = performance.now();
    for (const c of clocks) {
      if (c.stoppedAt === null) {
        c.handEl.style.transform = `translate(-50%, -100%) rotate(${currentAngle(c, now)}deg)`;
      }
    }
    rafId = requestAnimationFrame(animate);
  }

  function updateProgress() {
    const stopped = clocks.filter(c => c.stoppedAt !== null).length;
    const correct = clocks.filter(c => c.good).length;
    progressMeta.textContent = `Stopped ${stopped} / ${clocks.length} · ${correct} correct`;
  }

  function finishGame() {
    gameState = 'over';
    timer.stop();
    if (rafId) cancelAnimationFrame(rafId);

    const allGood = clocks.every(c => c.good);
    const goodCount = clocks.filter(c => c.good).length;

    if (allGood) {
      const avgError = clocks.reduce((s, c) => s + c.error, 0) / clocks.length;
      // score: lower time + lower error is better. Use time as primary metric for record.
      const configKey = `n${config.count}-t${config.targetSeconds}-tol${config.tolerance}`;
      const result = window.GameFramework.recordWin('stop-clock', timer.elapsed, configKey);
      const newBest = result.isNewBest ? '<span class="new-best">NEW BEST</span>' : '';
      statusEl.innerHTML = `All ${clocks.length} correct · avg error ${avgError.toFixed(2)}s ${newBest}`;
    } else {
      statusEl.textContent = `${goodCount} / ${clocks.length} correct. Better luck next time.`;
    }

    showPostGameControls();
  }

  function showPostGameControls() {
    startBtn.classList.remove('hidden');
    startBtn.textContent = 'Play Again';
    resetBtn.textContent = 'Change Settings';
  }

  function resetToIdle() {
    if (timer) timer.reset();
    if (rafId) cancelAnimationFrame(rafId);
    gameState = 'idle';
    clocks = [];

    settingsEl.classList.remove('locked');
    startBtn.classList.remove('hidden');
    startBtn.textContent = 'Start Game';
    resetBtn.classList.add('hidden');

    boardEl.innerHTML = '<div class="idle-msg">Press <b>Start Game</b> to begin</div>';
    boardEl.classList.add('idle');
    progressMeta.textContent = 'Not started';
    timerDisplay.textContent = '00:00';
    statusEl.textContent = '';
  }

  startBtn.addEventListener('click', startGame);
  resetBtn.addEventListener('click', resetToIdle);

  updateSettingsDisplay();
</script>
</body>
</html>
