<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synonym Dominoes</title>
<style>
:root{--bg-0:#0b0f1e;--bg-1:#131831;--bg-2:#1a2040;--surface:#1d2442;--surface-2:#252c52;--surface-hi:#2e376a;--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.14);--text:#eef1ff;--text-dim:rgba(238,241,255,0.62);--text-faint:rgba(238,241,255,0.38);--accent:#6ac9ff;--accent-2:#9a7bff;--medieval:#d0454c;--success:#3ed598;--gold:#ffd77a;--danger:#ff6b6b;--r-sm:8px;--r-md:12px;--r-lg:16px;--shadow-sm:0 2px 8px rgba(0,0,0,0.25);--shadow-md:0 8px 24px rgba(0,0,0,0.35);--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;--ease:cubic-bezier(0.4,0,0.2,1);}
*{box-sizing:border-box;}html,body{height:100%;}
body{margin:0;font-family:var(--font-sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(208,69,76,0.14),transparent 60%),radial-gradient(ellipse 60% 60% at 80% 100%,rgba(106,201,255,0.1),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);background-attachment:fixed;}
h1{margin:0 0 8px;font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
@supports ((-webkit-background-clip:text) or (background-clip:text)){h1{background:linear-gradient(135deg,#d0454c 0%,#ffb1b5 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}}
.sub{color:var(--text-dim);margin:0 0 24px;font-size:15px;text-align:center;max-width:620px;}
.back-link{position:fixed;top:20px;left:20px;color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm);background:rgba(29,36,66,0.7);border:1px solid var(--border);transition:all 0.2s var(--ease);z-index:10;}
.back-link:hover{color:var(--text);background:rgba(46,55,106,0.8);border-color:var(--border-hi);transform:translateX(-2px);}
.settings{background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:20px;display:grid;grid-template-columns:max-content 1fr;gap:14px 24px;align-items:center;box-shadow:var(--shadow-sm);transition:opacity 0.2s var(--ease);max-width:460px;width:100%;}
.settings.locked{opacity:0.45;pointer-events:none;}
.settings label{font-size:13px;color:var(--text-dim);font-weight:500;}
button{background:linear-gradient(135deg,#6ac9ff 0%,#9a7bff 100%);color:#0a1020;border:none;padding:11px 20px;border-radius:var(--r-sm);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.15s var(--ease);box-shadow:0 2px 8px rgba(106,201,255,0.25);}
button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(106,201,255,0.4);}
button:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
button.big{padding:13px 32px;font-size:15px;}
button.ghost{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border-hi);box-shadow:none;}
button.ghost:hover:not(:disabled){background:rgba(255,255,255,0.08);box-shadow:none;}
.pill-group{display:inline-flex;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;}
.pill{background:transparent;color:var(--text-dim);border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:none;}
button.pill:hover:not(:disabled){color:var(--text);background:rgba(255,255,255,0.04);transform:none;box-shadow:none;}
button.pill.active{background:linear-gradient(135deg,#d0454c 0%,#ffb1b5 100%);color:#2a0308;}
.timer-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:460px;margin-bottom:12px;padding:12px 18px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-md);}
.timer{font-family:var(--font-mono);font-size:20px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}
.meta{font-size:13px;color:var(--text-dim);font-weight:500;}
.status{margin-top:18px;text-align:center;min-height:24px;font-size:15px;color:var(--text);font-weight:500;}
.status .new-best{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:10px;background:linear-gradient(135deg,#ffd77a,#ff9d4a);color:#1a0f00;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.hidden{display:none !important;}
.board{background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-md);min-height:180px;display:flex;align-items:center;justify-content:center;}
.board.idle{padding:48px 24px;min-width:340px;}
.idle-msg{color:var(--text-faint);font-size:14px;text-align:center;}

.dom-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center;}
.domino{
  display:flex;
  border:2px solid var(--border-hi);
  border-radius:var(--r-md);
  background:linear-gradient(180deg,var(--surface-hi),var(--surface-2));
  overflow:hidden;
  cursor:pointer;
  user-select:none;
  transition:all 0.15s var(--ease);
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
.domino:hover{transform:translateY(-2px);border-color:var(--medieval);box-shadow:0 8px 16px rgba(208,69,76,0.3);}
.domino.selected{border-color:var(--medieval);box-shadow:0 0 22px rgba(208,69,76,0.5);background:linear-gradient(180deg,rgba(208,69,76,0.18),rgba(208,69,76,0.06));}
.domino-half{
  padding:16px 18px;min-width:100px;text-align:center;
  font-weight:700;font-size:14px;letter-spacing:0.04em;
}
.domino-half:first-child{border-right:1px solid var(--border-hi);}

.link-indicator{
  font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--text-faint);
  padding:0 2px;
}
.link-indicator.good{color:var(--success);}
.link-indicator.bad{color:var(--danger);}

.controls{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>
  <script>
window.GameFramework=(function(){
function formatTime(t){const m=Math.floor(t/60).toString().padStart(2,'0'),s=(Math.floor(t)%60).toString().padStart(2,'0');return m+':'+s;}
function createTimer(o){let st=0,el=0,iv=null;const d=o.display,lim=o.limitSeconds||0;function r(){if(!d)return;if(lim>0){const rem=Math.max(0,lim-el);d.textContent=formatTime(rem);d.style.color=rem<=10?'var(--danger)':'var(--accent)';}else{d.textContent=formatTime(el);d.style.color='var(--accent)';}}const api={start(){api.stop();st=Date.now();el=0;r();iv=setInterval(function(){el=Math.floor((Date.now()-st)/1000);r();if(o.onTick)o.onTick(el);if(lim>0&&el>=lim){api.stop();if(o.onExpire)o.onExpire();}},250);},stop(){if(iv){clearInterval(iv);iv=null;}},reset(){api.stop();el=0;r();},get elapsed(){return el;}};return api;}
const K='gamesCreation.records.v1';
function load(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):{};}catch(e){return{};}}
function save(r){try{localStorage.setItem(K,JSON.stringify(r));}catch(e){}}
function recordWin(g,s,c){const a=load();const k=c?g+':'+c:g;const e=a[k]||{wins:0};const nb=e.bestSeconds==null||s<e.bestSeconds;a[k]={bestSeconds:nb?s:e.bestSeconds,wins:(e.wins||0)+1,lastPlayed:Date.now()};save(a);return{isNewBest:nb};}
function injectBackLink(h){const a=document.createElement('a');a.className='back-link';a.href=h||'../index.html';a.textContent='\u2190 Menu';document.body.appendChild(a);}
return{formatTime:formatTime,createTimer:createTimer,recordWin:recordWin,injectBackLink:injectBackLink};
})();
GameFramework.injectBackLink();
GameFramework.sfx=(function(){let ctx=null;function ac(){try{if(!ctx){const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;ctx=new A();}if(ctx.state==='suspended')ctx.resume();return ctx;}catch(e){return null;}}
function tone(f,ty,dur,del,vol){const c=ac();if(!c)return;try{const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+(del||0);o.type=ty;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol,t+0.015);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+0.05);}catch(e){}}
return{click:function(){tone(660,'square',0.06,0,0.04);},win:function(){tone(523.25,'sine',0.16,0,0.1);tone(659.25,'sine',0.16,0.11,0.1);tone(783.99,'sine',0.28,0.22,0.1);},lose:function(){tone(330,'sine',0.18,0,0.08);tone(247,'sine',0.3,0.15,0.08);}};})();
</script>

  <h1>Synonym Dominoes</h1>
  <div class="sub">Arrange the dominoes so every touching pair of words are synonyms.</div>

  <div class="settings" id="settings">
    <label>Chain length:</label>
    <div class="pill-group" id="lenToggle">
      <button class="pill active" data-len="4">4 dominoes</button>
      <button class="pill" data-len="5">5 dominoes</button>
      <button class="pill" data-len="6">6 dominoes</button>
    </div>
  </div>

  <div class="timer-bar">
    <div class="meta" id="progressMeta">Not started</div>
    <div class="timer" id="timerDisplay">00:00</div>
  </div>

  <div class="board idle" id="board">
    <div class="idle-msg">Press <b>Start Game</b> to begin</div>
  </div>

  <div class="controls">
    <button id="startBtn" class="big">Start Game</button>
    <button id="submitBtn" class="hidden">Submit</button>
    <button id="resetBtn" class="ghost hidden">Reset</button>
  </div>

  <div class="status" id="status"></div>

<script>
  const SYNONYM_GROUPS = [
    ['big','large','huge','giant'],
    ['small','tiny','little','minute'],
    ['fast','quick','rapid','swift'],
    ['slow','gradual','leisurely'],
    ['happy','glad','joyful','cheerful'],
    ['sad','unhappy','gloomy','sorrowful'],
    ['smart','clever','brilliant','bright'],
    ['strong','powerful','mighty','sturdy'],
    ['weak','feeble','frail'],
    ['hot','warm','scorching','heated'],
    ['cold','chilly','freezing','frosty'],
    ['loud','noisy','deafening'],
    ['quiet','silent','hushed','mute'],
    ['brave','bold','fearless','courageous'],
    ['scared','afraid','frightened','terrified'],
    ['beautiful','pretty','lovely','gorgeous'],
    ['ugly','hideous','unsightly'],
    ['rich','wealthy','affluent'],
    ['poor','impoverished','destitute'],
    ['old','ancient','aged','elderly'],
    ['new','modern','fresh','recent'],
    ['easy','simple','effortless'],
    ['hard','difficult','tough','arduous'],
    ['kind','gentle','caring','compassionate'],
    ['mean','cruel','harsh','nasty'],
    ['funny','hilarious','amusing','comical'],
    ['angry','furious','enraged','mad'],
    ['tired','exhausted','weary','drained'],
    ['clean','tidy','spotless','pristine'],
    ['dirty','filthy','grimy','soiled'],
    ['begin','start','commence','initiate'],
    ['end','finish','conclude','terminate'],
    ['shout','yell','holler','bellow'],
    ['whisper','murmur','mumble'],
    ['walk','stroll','amble','saunter'],
    ['run','sprint','dash','bolt'],
    ['jump','leap','bound','vault'],
    ['throw','toss','hurl','fling'],
    ['grab','seize','snatch','clutch'],
    ['look','gaze','stare','peer'],
    ['eat','devour','consume','munch'],
    ['drink','sip','gulp','swig'],
    ['sleep','doze','snooze','slumber'],
    ['laugh','giggle','chuckle','cackle'],
    ['cry','weep','sob','wail'],
    ['talk','chat','converse','natter'],
    ['think','ponder','muse','contemplate'],
    ['build','construct','erect','assemble'],
    ['break','shatter','smash','fracture'],
    ['fix','repair','mend','restore'],
    ['hide','conceal','mask','veil'],
    ['show','reveal','display','exhibit'],
    ['wet','damp','moist','soggy'],
    ['dry','arid','parched'],
    ['shiny','gleaming','glossy','lustrous'],
    ['dark','dim','murky','shadowy'],
    ['empty','vacant','bare','hollow'],
    ['full','packed','crowded','crammed'],
    ['smooth','sleek','silky'],
    ['rough','coarse','jagged','bumpy'],
    ['sharp','keen','pointed'],
    ['dull','blunt'],
    ['real','genuine','authentic','actual'],
    ['fake','false','phony','counterfeit'],
    ['sure','certain','confident','positive'],
    ['odd','strange','weird','peculiar'],
    ['normal','ordinary','typical','usual'],
    ['rare','scarce','uncommon'],
    ['famous','renowned','celebrated','notable'],
    ['wrong','incorrect','mistaken','erroneous'],
    ['right','correct','accurate','precise'],
    ['risky','dangerous','perilous','hazardous'],
    ['safe','secure','protected'],
    ['calm','tranquil','serene','placid'],
    ['wild','frantic','frenzied','chaotic'],
    ['lucky','fortunate','charmed'],
    ['greedy','selfish','grasping'],
    ['generous','charitable','lavish'],
    ['lazy','idle','sluggish','lethargic'],
    ['eager','enthusiastic','avid','zealous'],
    ['polite','courteous','respectful','civil'],
    ['rude','impolite','insolent','impertinent'],
    ['smelly','stinky','pungent','rank'],
    ['tasty','delicious','flavourful','scrumptious'],
    ['boring','tedious','monotonous','dreary'],
    ['important','crucial','vital','essential'],
    ['trivial','minor','petty','insignificant'],
  ];

  // Build a quick lookup: word -> group index
  const WORD_GROUP = {};
  SYNONYM_GROUPS.forEach((g, i) => g.forEach(w => { WORD_GROUP[w] = i; }));

  const config = { length: 4 };
  let dominoes = [];   // array of [left, right]
  let current = [];    // shuffled order of dominoes
  let selected = null;
  let gameState = 'idle';
  let timer = null;

  const $ = (id) => document.getElementById(id);
  const boardEl = $('board'), settingsEl = $('settings');
  const startBtn = $('startBtn'), submitBtn = $('submitBtn'), resetBtn = $('resetBtn');
  const statusEl = $('status'), progressMeta = $('progressMeta');
  const timerDisplay = $('timerDisplay');
  const lenToggle = $('lenToggle');

  let currentLen = 4;
  lenToggle.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      if (gameState === 'playing') return;
      currentLen = parseInt(b.dataset.len, 10);
      lenToggle.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    });
  });

  function shuffle(a) {
    const x = a.slice();
    for (let i = x.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [x[i], x[j]] = [x[j], x[i]];
    }
    return x;
  }
  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function generate(n) {
    // Pick n+1 distinct synonym groups
    const shuffledGroups = shuffle(SYNONYM_GROUPS.map((g, i) => i)).slice(0, n + 1);
    const doms = [];
    for (let i = 0; i < n; i++) {
      const gL = SYNONYM_GROUPS[shuffledGroups[i]];
      const gR = SYNONYM_GROUPS[shuffledGroups[i + 1]];
      doms.push([pickRandom(gL), pickRandom(gR)]);
    }
    return doms;
  }

  function startGame() {
    config.length = currentLen;
    dominoes = generate(config.length);
    do {
      current = shuffle(dominoes);
    } while (JSON.stringify(current) === JSON.stringify(dominoes));

    selected = null;
    gameState = 'playing';
    statusEl.textContent = '';

    settingsEl.classList.add('locked');
    startBtn.classList.add('hidden');
    submitBtn.classList.remove('hidden');
    resetBtn.classList.remove('hidden');
    resetBtn.textContent = 'Reset';

    timer = window.GameFramework.createTimer({ display: timerDisplay });
    timer.start();
    render();
  }

  function render() {
    boardEl.innerHTML = '';
    boardEl.classList.remove('idle');

    const row = document.createElement('div');
    row.className = 'dom-row';

    for (let i = 0; i < current.length; i++) {
      if (i > 0) {
        const link = document.createElement('div');
        link.className = 'link-indicator';
        const rightPrev = current[i - 1][1];
        const leftCurr  = current[i][0];
        const good = WORD_GROUP[rightPrev] === WORD_GROUP[leftCurr];
        link.textContent = good ? '≡' : '≠';
        link.classList.add(good ? 'good' : 'bad');
        row.appendChild(link);
      }
      const dom = document.createElement('div');
      dom.className = 'domino' + (i === selected ? ' selected' : '');
      const L = document.createElement('div'); L.className = 'domino-half'; L.textContent = current[i][0];
      const R = document.createElement('div'); R.className = 'domino-half'; R.textContent = current[i][1];
      dom.appendChild(L); dom.appendChild(R);
      if (gameState === 'playing') dom.addEventListener('click', () => onDom(i));
      row.appendChild(dom);
    }
    boardEl.appendChild(row);

    const okLinks = countOkLinks();
    progressMeta.textContent = gameState === 'playing'
      ? `${okLinks} / ${current.length - 1} links valid`
      : 'Game over';
  }

  function countOkLinks() {
    let n = 0;
    for (let i = 1; i < current.length; i++) {
      if (WORD_GROUP[current[i - 1][1]] === WORD_GROUP[current[i][0]]) n++;
    }
    return n;
  }

  function onDom(i) {
    if (gameState !== 'playing') return;
    if (selected === null) { selected = i; }
    else if (selected === i) { selected = null; }
    else {
      [current[selected], current[i]] = [current[i], current[selected]];
      selected = null;
    }
    render();
  }

  submitBtn.addEventListener('click', () => {
    if (gameState !== 'playing') return;
    if (countOkLinks() === current.length - 1) {
      gameState = 'over'; timer.stop();
      GameFramework.sfx.win();
      const res = window.GameFramework.recordWin('synonym-dominoes', timer.elapsed, `len${config.length}`);
      const nb = res.isNewBest ? '<span class="new-best">NEW BEST</span>' : '';
      statusEl.innerHTML = `Solved in ${window.GameFramework.formatTime(timer.elapsed)} ${nb}`;
      submitBtn.classList.add('hidden');
      startBtn.classList.remove('hidden'); startBtn.textContent = 'Play Again';
      resetBtn.textContent = 'Change Settings';
    } else {
      statusEl.textContent = 'Not quite — some adjacent words aren\'t synonyms yet.';
    }
  });

  function resetIdle() {
    if (timer) timer.reset();
    gameState = 'idle';
    dominoes = []; current = []; selected = null;
    settingsEl.classList.remove('locked');
    startBtn.classList.remove('hidden'); startBtn.textContent = 'Start Game';
    submitBtn.classList.add('hidden'); resetBtn.classList.add('hidden');
    boardEl.classList.add('idle');
    boardEl.innerHTML = '<div class="idle-msg">Press <b>Start Game</b> to begin</div>';
    progressMeta.textContent = 'Not started';
    timerDisplay.textContent = '00:00';
    statusEl.textContent = '';
  }

  startBtn.addEventListener('click', startGame);
  resetBtn.addEventListener('click', resetIdle);
</script>
</body>
</html>
